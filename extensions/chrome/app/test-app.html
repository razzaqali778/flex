<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Test app — Flex SDK (no apiUrl)</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
      code { background: #eee; padding: 0.1rem 0.35rem; border-radius: 4px; }
      button { margin: 0.25rem 0.25rem 0.25rem 0; padding: 0.5rem 0.75rem; cursor: pointer; }
      pre { background: #111; color: #eee; padding: 1rem; overflow: auto; font-size: 12px; }
      .ok { color: #0a0; } .err { color: #c00; }
    </style>
  </head>
  <body>
    <h1>~/test — without <code>apiUrl</code></h1>
    <p>
      URL: <code id="url"></code><br />
      Keep Flex open in another tab on the <strong>same</strong> host (e.g.
      <a href="/" target="_blank">Flex home</a>).
    </p>
    <p id="status">Connecting…</p>
    <button type="button" id="btn-kpis">Consume KPIs</button>
    <button type="button" id="btn-produce">Produce inbound request</button>
    <pre id="out">(results)</pre>

    <script type="module">
      const FLEX_APP_URL = window.location.origin;
      document.getElementById('url').textContent = FLEX_APP_URL + '/test-app.html';

      const CHANNEL = 'flex-plugin-api';
      function call(method, payload) {
        return new Promise((resolve, reject) => {
          const bc = new BroadcastChannel(CHANNEL);
          const id = `test-${Date.now()}`;
          const onMsg = (ev) => {
            const d = ev.data;
            if (!d || d.channel !== CHANNEL || d.id !== id) return;
            bc.removeEventListener('message', onMsg);
            bc.close();
            if (d.ok) resolve(d.result);
            else reject(new Error(d.error || 'failed'));
          };
          bc.addEventListener('message', onMsg);
          bc.postMessage({ channel: CHANNEL, id, method, payload });
          setTimeout(() => {
            bc.removeEventListener('message', onMsg);
            bc.close();
            reject(new Error('Flex tab not open on ' + FLEX_APP_URL));
          }, 10000);
        });
      }

      const status = document.getElementById('status');
      const out = document.getElementById('out');
      const show = (x) => { out.textContent = JSON.stringify(x, null, 2); };

      async function ping() {
        try {
          await call('catalog');
          status.innerHTML = '<span class="ok">Connected (no apiUrl, no port 3847)</span>';
        } catch (e) {
          status.innerHTML = `<span class="err">${e.message}</span>`;
        }
      }

      document.getElementById('btn-kpis').onclick = async () => {
        try {
          show(await call('consume', { pluginId: 'flex.dashboard', dataset: 'kpi_snapshot' }));
        } catch (e) { show({ error: e.message }); }
      };
      document.getElementById('btn-produce').onclick = async () => {
        try {
          show(await call('produce', {
            pluginId: 'flex.governance',
            dataset: 'inbound_request',
            records: [{
              fromApp: 'eztrac',
              dataset: 'forecast_variance',
              recordCount: 50,
              purpose: 'From ~/test via test-app.html',
            }],
            sourceApp: 'eztrac',
          }));
        } catch (e) { show({ error: e.message }); }
      };

      ping();
      setInterval(ping, 5000);
    </script>
  </body>
</html>
