<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex Quick View</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 64 64" fill="none">
          <rect width="64" height="64" rx="14" fill="#111827" />
          <path
            d="M16 44V20l16 12 16-12v24"
            stroke="#22d3ee"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <circle cx="32" cy="32" r="4" fill="#818cf8" />
        </svg>
        <div>
          <h1>Flex</h1>
          <p>FinOps · Extension</p>
        </div>
      </div>
      <span class="live-dot" title="Connected"></span>
    </header>

    <section class="kpis" id="kpis">
      <div class="kpi">
        <span class="kpi-label">Cloud spend</span>
        <span class="kpi-value" id="spend">—</span>
        <span class="kpi-sub" id="spend-change"></span>
      </div>
      <div class="kpi">
        <span class="kpi-label">Utilization</span>
        <span class="kpi-value" id="util">—</span>
      </div>
      <div class="kpi kpi-alert" id="pending-box">
        <span class="kpi-label">Pending</span>
        <span class="kpi-value" id="pending">0</span>
      </div>
      <div class="kpi">
        <span class="kpi-label">Anomalies</span>
        <span class="kpi-value" id="anomalies">0</span>
      </div>
    </section>

    <section class="savings-banner" id="savings-banner">
      <span class="savings-label">Identified savings</span>
      <span class="savings-value" id="savings">$23.2K/mo</span>
    </section>

    <section class="plugin-actions">
      <div class="plugin-actions-head">
        <h2>Plugin API</h2>
        <span class="api-status" id="api-status" title="Flex API">—</span>
      </div>
      <p class="plugin-actions-hint">Same actions as VS Code — requires <code>npm run api</code></p>
      <div class="plugin-actions-list" id="plugin-actions"></div>
    </section>

    <section class="actions">
      <button type="button" class="btn btn-primary" id="open-panel">
        <span>Open command center</span>
      </button>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" data-route="/govern/exchange">Governance</button>
        <button type="button" class="btn btn-ghost" data-route="/chargeback">Chargeback</button>
        <button type="button" class="btn btn-ghost" data-route="/workforce">Workforce</button>
      </div>
      <div class="btn-row">
        <button type="button" class="btn btn-ghost" data-route="/optimization">Savings</button>
        <button type="button" class="btn btn-ghost" data-route="/anomalies">Anomalies</button>
        <button type="button" class="btn btn-ghost" data-route="/cloud">Cloud</button>
        <button type="button" class="btn btn-ghost" data-route="/assistant">AI</button>
      </div>
    </section>

    <section class="workflow-banner hidden" id="workflow-banner">
      <div class="workflow-banner-inner">
        <span class="workflow-badge" id="workflow-badge">Approved</span>
        <div class="workflow-copy">
          <strong id="workflow-title">—</strong>
          <span id="workflow-sub">—</span>
        </div>
      </div>
    </section>

    <section class="feed">
      <h2>Recent activity</h2>
      <ul id="activity"></ul>
    </section>

    <footer class="footer">
      <button type="button" class="link" id="open-full">Open full app ↗</button>
      <span class="updated" id="updated"></span>
    </footer>
    <script src="popup.js"></script>
  </body>
</html>
